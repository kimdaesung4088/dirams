<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>납품지시 목록 - DIRAMS</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/table.css">
  <link rel="stylesheet" href="../assets/css/form.css">
</head>
<body class="app-layout">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- 헤더 -->
  <header class="app-header">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a href="dashboard.html" class="header-brand" style="text-decoration: none; color: inherit; cursor: pointer;">
      <div class="header-brand-text">
        <div class="header-brand-title">동남권원자력의학원 납품관리시스템</div>
      </div>
    </a>
    <div class="header-actions">
      <div class="header-user">
        <span class="header-user-name" id="headerUserName"></span>
        <a href="#" class="header-logout" data-action="logout">로그아웃</a>
      </div>
    </div>
  </header>

  <div class="app-body">
    <!-- 사이드바 -->
    <aside class="app-sidebar" id="sidebar">
      <nav class="sidebar-nav" role="navigation" aria-label="주메뉴">
        <div class="nav-group">
          <span class="nav-group-label">납품관리시스템</span>
          <ul class="nav-list">
            <li class="nav-item">
              <div class="nav-parent-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                납품지시
              </div>
              <ul class="nav-submenu">
                <li><a href="delivery-list.html?status=waiting" class="nav-link" data-status="waiting">미접수</a></li>
                <li><a href="delivery-list.html?status=received" class="nav-link" data-status="received">접수</a></li>
                <li><a href="delivery-list.html?status=done" class="nav-link" data-status="done">납품완료</a></li>
                <li><a href="delivery-list.html" class="nav-link">전체</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </nav>
    </aside>

    <!-- 메인 -->
    <main class="app-main">
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title" id="pageTitle">납품지시</h1>
          <nav class="breadcrumb">
            <a href="dashboard.html">납품관리시스템</a>
            <span class="breadcrumb-sep">›</span>
            <span>납품지시</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current" id="breadcrumbCurrent">전체</span>
          </nav>
        </div>
      </div>

      <div class="content-body">

        <!-- 필터 바 -->
        <div class="filter-bar">
          <div class="filter-group">
            <label class="filter-label" for="filterStatus">상태</label>
            <select id="filterStatus" class="form-control form-control-sm" style="width: 120px;">
              <option value="all">전체</option>
              <option value="waiting">미접수</option>
              <option value="received">접수</option>
              <option value="done">납품완료</option>
            </select>
          </div>
          <div class="filter-group">
            <span class="filter-label">발행일자</span>
            <div class="date-range">
              <input type="date" id="filterDateFrom" class="form-control form-control-sm">
              <span class="date-range-sep">~</span>
              <input type="date" id="filterDateTo" class="form-control form-control-sm">
            </div>
          </div>
          <div class="filter-actions">
            <button class="btn btn-primary btn-sm" id="btnSearch">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              검색
            </button>
            <button class="btn btn-ghost btn-sm" id="btnReset">초기화</button>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-container">
          <div class="table-toolbar">
            <div class="table-count">
              총 <strong id="totalCount">0</strong>건
            </div>
          </div>
          <div class="table-wrapper">
            <table class="data-table" aria-label="납품지시 목록">
              <thead>
                <tr>
                  <th class="center">NO</th>
                  <th>납품번호</th>
                  <th>요구부서</th>
                  <th>발행일자</th>
                  <th>납품기한</th>
                  <th>납품예정일</th>
                  <th>납품일자</th>
                  <th class="center">긴급</th>
                  <th class="right">금액</th>
                  <th class="center">상태</th>
                  <th>물품내역</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <!-- JS로 렌더링 -->
              </tbody>
            </table>
          </div>
          <!-- 빈 상태 -->
          <div class="empty-state" id="emptyState" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <div class="empty-state-title">해당 조건의 납품지시가 없습니다</div>
            <div class="empty-state-desc">검색 조건을 변경하거나 초기화해 주세요.</div>
          </div>
        </div>

        <!-- 페이지네이션 -->
        <div class="pagination" id="pagination"></div>

      </div>
    </main>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../assets/js/table-filter.js"></script>
  <script src="../assets/js/delivery-list.js"></script>
</body>
</html>
