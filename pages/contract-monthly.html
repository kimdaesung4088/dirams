<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>월별물품계약현황 - DIRAMS</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/table.css">
  <link rel="stylesheet" href="../assets/css/form.css">
</head>
<body class="app-layout">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- 헤더 -->
  <header class="app-header">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="메뉴 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a href="dashboard.html" class="header-brand" style="text-decoration:none; color:inherit; cursor:pointer;">
      <div class="header-brand-text">
        <div class="header-brand-title">동남권원자력의학원 납품관리시스템</div>
      </div>
    </a>
    <div class="header-actions">
      <div class="header-user">
        <span class="header-user-name" id="headerUserName"></span>
        <a href="#" class="header-logout" data-action="logout">로그아웃</a>
      </div>
    </div>
  </header>

  <div class="app-body">
    <!-- 사이드바 -->
    <aside class="app-sidebar" id="sidebar">
      <nav class="sidebar-nav" role="navigation" aria-label="주메뉴">
        <div class="nav-group">
          <span class="nav-group-label">납품관리시스템</span>
          <ul class="nav-list">
            <li class="nav-item">
              <div class="nav-parent-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                납품지시
              </div>
              <ul class="nav-submenu">
                <li><a href="delivery-list.html?status=waiting" class="nav-link" data-status="waiting">미접수</a></li>
                <li><a href="delivery-list.html?status=received" class="nav-link" data-status="received">접수</a></li>
                <li><a href="delivery-list.html?status=done" class="nav-link" data-status="done">납품완료</a></li>
                <li><a href="delivery-list.html" class="nav-link">전체</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a href="contract-monthly.html" class="nav-link nav-link-top active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                월별물품계약현황
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </aside>

    <!-- 메인 -->
    <main class="app-main">
      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">월별물품계약현황</h1>
          <nav class="breadcrumb">
            <a href="dashboard.html">납품관리시스템</a>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">월별물품계약현황</span>
          </nav>
        </div>
      </div>

      <div class="content-body">

        <!-- 필터 바 -->
        <div class="filter-bar">
          <div class="filter-group">
            <label class="filter-label" for="filterMonth">납품월</label>
            <input type="text" id="filterMonth" class="form-control form-control-sm"
              placeholder="예: 202603" maxlength="6" style="width:120px;">
            <button class="btn btn-primary btn-sm" id="btnSearch" style="margin-left:var(--space-2);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              검색
            </button>
          </div>
          <div style="margin-left:auto; font-size:var(--text-sm); color:var(--text-secondary); display:flex; align-items:center; gap:4px;">
            총금액 :&nbsp;<strong id="totalAmount" style="color:var(--text-primary);">-</strong>
          </div>
        </div>

        <!-- 테이블 -->
        <div class="table-container">
          <div class="table-toolbar">
            <div class="table-count">총 <strong id="totalCount">0</strong>건</div>
            <div class="table-toolbar-actions">
              <button class="btn btn-primary btn-sm" id="btnPrint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
                  <polyline points="6 9 6 2 18 2 18 9"/>
                  <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                  <rect x="6" y="14" width="12" height="8"/>
                </svg>
                출력
              </button>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="data-table" aria-label="월별물품계약현황">
              <thead>
                <tr>
                  <th class="center" style="width:46px;">NO</th>
                  <th style="width:90px;">물품코드</th>
                  <th>물품명</th>
                  <th class="right" style="width:76px;">단가</th>
                  <th class="right" style="width:72px;">납품수량</th>
                  <th class="right" style="width:90px;">금액</th>
                  <th class="center" style="width:110px;">장소</th>
                  <th class="center" style="width:100px; white-space:nowrap;">발행일</th>
                  <th class="center" style="width:100px; white-space:nowrap;">납품일</th>
                  <th class="center" style="width:90px;">구매요구일</th>
                  <th class="center" style="width:80px;">계약일</th>
                  <th class="center" style="width:80px;">지출결재일</th>
                  <th class="center" style="width:72px;">결재상태</th>
                </tr>
              </thead>
              <tbody id="tableBody">
              </tbody>
            </table>
          </div>
          <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <div class="empty-state-title">납품월을 입력하고 검색하세요</div>
            <div class="empty-state-desc">예: 202603</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/mock-contract.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../assets/js/contract-monthly.js"></script>
</body>
</html>
